spring.application.name=thymeleaf

# PostgreSQL (por defecto en local). Puedes sobreescribir con variables de entorno.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/wiki}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:wikiuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:wikisecret}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}

# JPA / Hibernate
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
